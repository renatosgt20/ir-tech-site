<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>iR Tech - Sistema Profissional</title>

<!-- Firebase versão compatível -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
  background:#05080f;
  color:white;
  font-family:Arial;
  text-align:center;
}

#chat{
  position:fixed;
  bottom:20px;
  right:20px;
  width:300px;
  background:#111;
  border-radius:10px;
  padding:10px;
}

#msgs{
  height:200px;
  overflow:auto;
  text-align:left;
}

input{
  width:70%;
}

button{
  cursor:pointer;
}
</style>
</head>
<body>

<h1>iR Tech Online</h1>

<p id="status">Conectando...</p>

<div id="users"></div>

<div id="chat">
  <div id="msgs"></div>
  <input id="msg" placeholder="Digite...">
  <button onclick="send()">Enviar</button>
</div>

<script>

// SUA CONFIG (já coloquei)
const firebaseConfig = {
  apiKey: "AIzaSyCOM-RRU9Gf8FVlCbaUekdPIogu8iEyEEw",
  authDomain: "ir-tech-f5cc5.firebaseapp.com",
  projectId: "ir-tech-f5cc5",
  storageBucket: "ir-tech-f5cc5.firebasestorage.app",
  messagingSenderId: "757349243581",
  appId: "1:757349243581:web:e3b7357ff75f50c1a235d4",
  measurementId: "G-WKGCH29TGJ"
};

// INICIAR FIREBASE
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId;
let isAdmin = false;

// LOGIN AUTOMÁTICO
auth.signInAnonymously().then(res=>{
  userId = res.user.uid;

  document.getElementById('status').innerText = "Online: " + userId;

  // 👇 DEPOIS VOCÊ VAI COLOCAR SEU ID AQUI
  if(userId === "ADMIN_ID_AQUI"){
    isAdmin = true;
  }

  db.collection("users").doc(userId).set({
    online: true
  });

  loadUsers();
  loadChat();
});

// LISTAR USUÁRIOS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let html = "<h3>Usuários Online</h3>";

    snap.forEach(doc=>{
      html += doc.id;

      if(isAdmin){
        html += ` <button onclick="kick('${doc.id}')">Kick</button>`;
      }

      html += "<br>";
    });

    document.getElementById("users").innerHTML = html;
  });
}

// KICKAR USUÁRIO
function kick(id){
  db.collection("users").doc(id).delete();
}

// ENVIAR MENSAGEM
function send(){
  const txt = document.getElementById("msg").value;

  if(!txt) return;

  db.collection("chat").add({
    user:userId,
    text:txt,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

// CARREGAR CHAT EM TEMPO REAL
function loadChat(){
  db.collection("chat").orderBy("time")
  .onSnapshot(snap=>{
    let html="";
    snap.forEach(doc=>{
      const d=doc.data();
      html += `<div><b>${d.user}:</b> ${d.text}</div>`;
    });
    document.getElementById("msgs").innerHTML = html;
  });
}

</script>

</body>
</html>
